<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تذكير الدواء</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; }

    .app { padding: 1.5rem 1rem; max-width: 520px; margin: 0 auto; direction: rtl; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .header h1 { font-size: 22px; font-weight: 500; }
    .clock { font-size: 14px; color: #666; background: #ebebeb; padding: 6px 12px; border-radius: 8px; border: 0.5px solid #ddd; }

    .notif-btn { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; color: #1a1a1a; font-size: 13px; cursor: pointer; margin-bottom: 0.5rem; width: 100%; justify-content: center; }
    .notif-btn:hover { background: #ebebeb; }
    .notif-btn.granted { border-color: #1D9E75; color: #0F6E56; background: #E1F5EE; }
    .notif-btn.denied  { border-color: #D85A30; color: #993C1D; background: #FAECE7; }

    .info-banner { font-size: 12px; color: #7a6200; background: #FFF8DC; border: 0.5px solid #e8d96a; border-radius: 8px; padding: 8px 12px; margin-bottom: 1rem; line-height: 1.6; }
    .info-banner strong { display: block; margin-bottom: 2px; }

    .add-card { background: #fff; border-radius: 12px; border: 0.5px solid #ddd; padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    .add-card h2 { font-size: 14px; font-weight: 500; color: #666; margin-bottom: 12px; }
    .fields { display: flex; gap: 8px; flex-wrap: wrap; }
    .fields input { flex: 1; min-width: 120px; padding: 8px 12px; border-radius: 8px; border: 0.5px solid #ccc; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
    .fields input:focus { outline: none; border-color: #7F77DD; box-shadow: 0 0 0 2px #EEEDFE; }
    .dose-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
    .dose-row select { flex: 1; padding: 8px 12px; border-radius: 8px; border: 0.5px solid #ccc; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
    .add-btn { padding: 9px 20px; border-radius: 8px; border: none; background: #534AB7; color: #EEEDFE; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .add-btn:hover { background: #3C3489; }
    .add-btn:active { transform: scale(0.98); }

    .section-title { font-size: 14px; font-weight: 500; color: #666; margin-bottom: 10px; }
    .med-list { display: flex; flex-direction: column; gap: 8px; }
    .empty { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; border: 0.5px dashed #ddd; border-radius: 12px; }

    .med-card { background: #fff; border-radius: 12px; border: 0.5px solid #ddd; padding: 12px 16px; display: flex; align-items: center; gap: 12px; transition: border-color 0.2s; }
    .med-card.taken { opacity: 0.55; }
    .med-card.ringing { border-color: #534AB7; box-shadow: 0 0 0 3px #EEEDFE; animation: ring 0.5s ease 3; }
    @keyframes ring { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

    .med-icon { width: 38px; height: 38px; border-radius: 50%; background: #EEEDFE; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .med-icon.taken-icon { background: #E1F5EE; }

    .med-info { flex: 1; }
    .med-name { font-size: 15px; font-weight: 500; }
    .med-meta { font-size: 12px; color: #666; margin-top: 2px; }

    .med-actions { display: flex; gap: 6px; align-items: center; }
    .take-btn { padding: 5px 12px; border-radius: 8px; border: 0.5px solid #1D9E75; background: transparent; color: #0F6E56; font-size: 12px; cursor: pointer; }
    .take-btn:hover { background: #E1F5EE; }
    .take-btn.undo { border-color: #ccc; color: #666; }
    .take-btn.undo:hover { background: #ebebeb; }
    .del-btn { padding: 5px 8px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; color: #aaa; font-size: 13px; cursor: pointer; line-height: 1; }
    .del-btn:hover { border-color: #D85A30; color: #993C1D; background: #FAECE7; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #3C3489; color: #EEEDFE; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; }

    .sw-status { font-size: 11px; text-align: center; color: #aaa; margin-bottom: 0.5rem; }
    .sw-status.ok  { color: #0F6E56; }
    .sw-status.err { color: #993C1D; }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>💊 تذكير الدواء</h1>
    <div class="clock" id="clock">--:--</div>
  </div>

  <button class="notif-btn" id="notifBtn" onclick="enableNotif()">
    <span id="notifIcon">🔔</span>
    <span id="notifText">تفعيل الإشعارات</span>
  </button>

  <div class="info-banner">
    <strong>⚠️ تنبيه مهم</strong>
    عشان الإشعارات تشتغل وانت بعيد، خلّي التاب ده مفتوح في المتصفح — حتى لو قفلت الشاشة أو فتحت تطبيقات تانية. المتصفح هيشغّل التذكيرات في الخلفية تلقائيًا.
  </div>

  <div id="swStatus" class="sw-status">جاري تفعيل الخلفية...</div>

  <div class="add-card">
    <h2>إضافة دواء</h2>
    <div class="fields">
      <input type="text" id="medName" placeholder="اسم الدواء" />
      <input type="time" id="medTime" />
    </div>
    <div class="dose-row">
      <select id="medDose">
        <option value="قرص واحد">قرص واحد</option>
        <option value="قرصان">قرصان</option>
        <option value="نصف قرص">نصف قرص</option>
        <option value="5 مل">5 مل</option>
        <option value="10 مل">10 مل</option>
        <option value="حقنة">حقنة</option>
        <option value="قطرتان">قطرتان</option>
      </select>
      <button class="add-btn" onclick="addMed()">إضافة</button>
    </div>
  </div>

  <div class="section-title">أدويتي</div>
  <div class="med-list" id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── Service Worker inline (Blob) ───────────────────────────────────────────
  // Because this is a single HTML file, we register a SW from a blob URL.
  // The SW holds its own alarm loop so it keeps firing even when the tab is hidden.
  const SW_CODE = `
    const INTERVAL = 30000; // check every 30 s

    self.addEventListener('install', e => { self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });

    // Message from page: update meds list inside SW
    self.addEventListener('message', e => {
      if (e.data && e.data.type === 'UPDATE_MEDS') {
        self._meds = e.data.meds || [];
        self._lastNotif = self._lastNotif || {};
      }
    });

    // Periodic alarm loop via setTimeout chain
    function alarm() {
      const meds = self._meds || [];
      const now  = new Date();
      const cur  = now.toTimeString().slice(0,5);
      meds.forEach(m => {
        if (m.time === cur && !m.taken) {
          const key = m.id + '-' + cur;
          if (!self._lastNotif[key]) {
            self._lastNotif[key] = true;
            self.registration.showNotification('تذكير الدواء 💊', {
              body: 'حان وقت أخذ ' + m.name + ' · ' + m.dose,
              icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text y="52" font-size="52">💊</text></svg>',
              tag: key,
              renotify: true,
              requireInteraction: true,
              vibrate: [200, 100, 200]
            });
            // tell page to ring the card
            self.clients.matchAll({ type: 'window' }).then(clients => {
              clients.forEach(c => c.postMessage({ type: 'RING', id: m.id, name: m.name }));
            });
          }
        }
      });
      // Reset lastNotif keys older than current minute
      Object.keys(self._lastNotif || {}).forEach(k => {
        if (!k.endsWith('-' + cur)) delete self._lastNotif[k];
      });
      setTimeout(alarm, INTERVAL);
    }
    setTimeout(alarm, INTERVAL);
  `;

  let swReg = null;

  async function registerSW() {
    if (!('serviceWorker' in navigator)) {
      setSwStatus('المتصفح لا يدعم الخلفية', false);
      return;
    }
    try {
      const blob = new Blob([SW_CODE], { type: 'application/javascript' });
      const url  = URL.createObjectURL(blob);
      swReg = await navigator.serviceWorker.register(url, { scope: './' });
      setSwStatus('✅ الخلفية مفعّلة — التذكيرات ستعمل حتى لو أغلقت التاب', true);
      navigator.serviceWorker.addEventListener('message', e => {
        if (e.data && e.data.type === 'RING') {
          ringCard(e.data.id, e.data.name);
        }
      });
      syncToSW();
    } catch (err) {
      // Blob SW not allowed on some browsers (e.g. Firefox) — fall back gracefully
      setSwStatus('الخلفية غير متاحة في هذا المتصفح — ابق التاب مفتوحًا', false);
    }
  }

  function setSwStatus(msg, ok) {
    const el = document.getElementById('swStatus');
    el.textContent = msg;
    el.className = 'sw-status ' + (ok ? 'ok' : 'err');
  }

  function syncToSW() {
    if (!navigator.serviceWorker.controller) return;
    navigator.serviceWorker.controller.postMessage({ type: 'UPDATE_MEDS', meds });
  }

  registerSW();

  // ─── App logic ───────────────────────────────────────────────────────────────
  let meds = JSON.parse(localStorage.getItem('meds') || '[]');
  let lastNotif = {};

  function updateNotifBtn() {
    const btn  = document.getElementById('notifBtn');
    const icon = document.getElementById('notifIcon');
    const text = document.getElementById('notifText');
    if (Notification.permission === 'granted') {
      btn.className = 'notif-btn granted';
      icon.textContent = '✅';
      text.textContent = 'الإشعارات مفعّلة';
    } else if (Notification.permission === 'denied') {
      btn.className = 'notif-btn denied';
      icon.textContent = '❌';
      text.textContent = 'الإشعارات محظورة — يرجى السماح من إعدادات المتصفح';
    }
  }
  updateNotifBtn();

  function enableNotif() {
    Notification.requestPermission().then(p => {
      updateNotifBtn();
      showToast(p === 'granted' ? 'تم تفعيل الإشعارات ✅' : 'تم رفض الإشعارات ❌');
    });
  }

  function addMed() {
    const name = document.getElementById('medName').value.trim();
    const time = document.getElementById('medTime').value;
    const dose = document.getElementById('medDose').value;
    if (!name || !time) { showToast('من فضلك أدخل الاسم والوقت'); return; }
    meds.push({ id: Date.now(), name, time, dose, taken: false });
    save();
    render();
    document.getElementById('medName').value = '';
    document.getElementById('medTime').value = '';
    showToast('تمت الإضافة ✅');
  }

  function toggleTaken(id) {
    const m = meds.find(x => x.id === id);
    if (m) { m.taken = !m.taken; save(); render(); }
  }

  function deleteMed(id) {
    meds = meds.filter(x => x.id !== id);
    save();
    render();
    showToast('تم الحذف');
  }

  function save() {
    localStorage.setItem('meds', JSON.stringify(meds));
    syncToSW();
  }

  function render() {
    const list = document.getElementById('list');
    if (!meds.length) {
      list.innerHTML = '<div class="empty">لا توجد أدوية مضافة بعد</div>';
      return;
    }
    const sorted = [...meds].sort((a, b) => a.time.localeCompare(b.time));
    list.innerHTML = sorted.map(m => `
      <div class="med-card ${m.taken ? 'taken' : ''}" id="card-${m.id}">
        <div class="med-icon ${m.taken ? 'taken-icon' : ''}">${m.taken ? '✅' : '💊'}</div>
        <div class="med-info">
          <div class="med-name">${m.name}</div>
          <div class="med-meta">${m.time} · ${m.dose}</div>
        </div>
        <div class="med-actions">
          <button class="take-btn ${m.taken ? 'undo' : ''}" onclick="toggleTaken(${m.id})">${m.taken ? 'تراجع' : 'أخذته'}</button>
          <button class="del-btn" onclick="deleteMed(${m.id})">✕</button>
        </div>
      </div>
    `).join('');
  }

  function ringCard(id, name) {
    beep();
    const card = document.getElementById('card-' + id);
    if (card) {
      card.classList.add('ringing');
      setTimeout(() => card.classList.remove('ringing'), 2000);
    }
    showToast('حان وقت ' + name + '!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  function beep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [0, 0.15, 0.3].forEach(d => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 880;
        g.gain.setValueAtTime(0.3, ctx.currentTime + d);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 0.2);
        o.start(ctx.currentTime + d);
        o.stop(ctx.currentTime + d + 0.2);
      });
    } catch (e) {}
  }

  // ─── Foreground fallback loop (when tab is visible) ──────────────────────────
  setInterval(() => {
    const now = new Date();
    const cur = now.toTimeString().slice(0, 5);
    meds.forEach(m => {
      if (m.time === cur && !m.taken) {
        const key = m.id + '-' + cur;
        if (!lastNotif[key]) {
          lastNotif[key] = true;
          ringCard(m.id, m.name);
          if (Notification.permission === 'granted') {
            new Notification('تذكير الدواء', { body: 'حان وقت أخذ ' + m.name + ' · ' + m.dose });
          }
        }
      }
    });
  }, 10000);

  render();
</script>

</body>
</html>
