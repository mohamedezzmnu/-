<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تذكير الدواء</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f5f3;
  --color-background-tertiary: #eeede8;
  --color-background-success: #E1F5EE;
  --color-background-danger: #FAECE7;
  --color-background-info: #E6F1FB;
  --color-text-primary: #1a1a18;
  --color-text-secondary: #5f5e5a;
  --color-text-success: #0F6E56;
  --color-text-danger: #993C1D;
  --color-text-info: #185FA5;
  --color-border-tertiary: rgba(0,0,0,0.15);
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: system-ui, -apple-system, sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #1e1e1c;
    --color-background-secondary: #2a2a28;
    --color-background-tertiary: #141412;
    --color-background-success: #04342C;
    --color-background-danger: #4A1B0C;
    --color-background-info: #042C53;
    --color-text-primary: #f0efe8;
    --color-text-secondary: #b4b2a9;
    --color-text-success: #9FE1CB;
    --color-text-danger: #F5C4B3;
    --color-text-info: #85B7EB;
    --color-border-tertiary: rgba(255,255,255,0.12);
  }
}

body{font-family:var(--font-sans);background:var(--color-background-tertiary);color:var(--color-text-primary)}
.app{max-width:480px;margin:0 auto;padding:1.5rem 1rem;direction:rtl}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.header h1{font-size:20px;font-weight:500;display:flex;align-items:center;gap:8px}
.pill-icon{width:28px;height:28px;background:var(--color-background-info);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px}
.clock-badge{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 12px;font-size:13px;font-weight:500;color:var(--color-text-secondary)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:500;color:#534AB7}
.stat-num.green{color:#0F6E56}
.stat-num.gray{color:var(--color-text-secondary)}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.notif-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;border-radius:var(--border-radius-md);border:0.5px solid #1D9E75;background:var(--color-background-success);color:var(--color-text-success);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:1rem}
.add-card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1rem 1.25rem;margin-bottom:1.25rem}
.add-card-title{font-size:13px;color:var(--color-text-secondary);margin-bottom:10px;font-weight:500}
.row{display:flex;gap:8px;margin-bottom:8px}
.row input,.row select{flex:1;padding:8px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:13px;min-width:0}
.add-btn{padding:9px 18px;border-radius:var(--border-radius-md);border:none;background:#534AB7;color:#EEEDFE;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.progress-bar-wrap{background:var(--color-background-secondary);border-radius:100px;height:6px;margin-bottom:1.25rem;overflow:hidden}
.progress-bar{height:6px;background:#534AB7;border-radius:100px;width:0%;transition:width 0.4s}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary)}
.filter-row{display:flex;gap:6px}
.filter-btn{padding:4px 10px;border-radius:100px;border:0.5px solid var(--color-border-tertiary);background:transparent;font-size:11px;color:var(--color-text-secondary);cursor:pointer}
.filter-btn.active{background:#EEEDFE;border-color:#AFA9EC;color:#534AB7}
.clear-btn{padding:4px 10px;border-radius:100px;border:0.5px solid var(--color-border-tertiary);background:transparent;font-size:11px;color:var(--color-text-danger);cursor:pointer;display:none}
.med-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.med-card{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:12px 14px;display:flex;align-items:center;gap:12px;transition:all 0.2s}
.med-card.taken{opacity:0.55;border-style:dashed}
.med-card.upcoming{border-right:3px solid #534AB7;border-radius:0 var(--border-radius-lg) var(--border-radius-lg) 0}
.med-card.overdue{border-right:3px solid #D85A30;border-radius:0 var(--border-radius-lg) var(--border-radius-lg) 0}
.med-card.soon{border-right:3px solid #BA7517;border-radius:0 var(--border-radius-lg) var(--border-radius-lg) 0}
.med-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.med-dot.purple{background:#EEEDFE}
.med-dot.teal{background:#E1F5EE}
.med-dot.coral{background:#FAECE7}
.med-dot.taken-bg{background:var(--color-background-secondary)}
.med-info{flex:1;min-width:0}
.med-name{font-size:14px;font-weight:500}
.med-meta{font-size:12px;color:var(--color-text-secondary);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 7px;border-radius:100px;font-size:10px;font-weight:500}
.badge.upcoming{background:#EEEDFE;color:#3C3489}
.badge.overdue{background:#FAECE7;color:#993C1D}
.badge.taken{background:#E1F5EE;color:#085041}
.badge.soon{background:#FAEEDA;color:#854F0B}
.med-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.take-btn{padding:5px 11px;border-radius:var(--border-radius-md);border:0.5px solid #1D9E75;background:transparent;color:#0F6E56;font-size:11px;cursor:pointer}
.take-btn.undo{border-color:var(--color-border-tertiary);color:var(--color-text-secondary)}
.del-btn{padding:5px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:transparent;color:var(--color-text-secondary);font-size:12px;cursor:pointer}
.empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:13px;border:0.5px dashed var(--color-border-tertiary);border-radius:var(--border-radius-lg)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#3C3489;color:#EEEDFE;padding:9px 18px;border-radius:var(--border-radius-md);font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:99}
.toast.show{opacity:1}
.sw-ok{font-size:11px;color:var(--color-text-success);text-align:center;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:4px}
.dot-live{width:6px;height:6px;background:#1D9E75;border-radius:50%;display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.ring{animation:shake 0.5s ease 3;border-color:#534AB7 !important;box-shadow:0 0 0 3px #EEEDFE}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

@media (prefers-color-scheme: dark) {
  .filter-btn.active{background:#3C3489;border-color:#534AB7;color:#EEEDFE}
  .badge.upcoming{background:#26215C;color:#AFA9EC}
  .badge.soon{background:#412402;color:#FAC775}
  .badge.overdue{background:#4A1B0C;color:#F5C4B3}
  .badge.taken{background:#04342C;color:#9FE1CB}
  .med-dot.purple{background:#26215C}
  .med-dot.teal{background:#04342C}
  .med-dot.coral{background:#4A1B0C}
  .add-btn{background:#534AB7;color:#EEEDFE}
  .ring{box-shadow:0 0 0 3px #26215C}
  .stat-num{color:#AFA9EC}
  .stat-num.green{color:#9FE1CB}
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1><div class="pill-icon">💊</div> تذكير الدواء</h1>
    <div class="clock-badge" id="clock">--:--</div>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">إجمالي</div></div>
    <div class="stat"><div class="stat-num green" id="s-taken">0</div><div class="stat-label">تم أخذها</div></div>
    <div class="stat"><div class="stat-num gray" id="s-rem">0</div><div class="stat-label">متبقي</div></div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar" id="prog"></div></div>

  <button class="notif-btn" id="notifBtn" onclick="enableNotif()">
    <span id="notifIcon">🔔</span>
    <span id="notifText">تفعيل الإشعارات</span>
  </button>

  <div class="sw-ok" id="swStatus"><span class="dot-live"></span> جاري تفعيل الخلفية...</div>

  <div class="add-card">
    <div class="add-card-title">إضافة دواء جديد</div>
    <div class="row">
      <input type="text" id="medName" placeholder="اسم الدواء" />
      <input type="time" id="medTime" />
    </div>
    <div class="row">
      <select id="medDose">
        <option value="قرص واحد">قرص واحد</option>
        <option value="قرصان">قرصان</option>
        <option value="نصف قرص">نصف قرص</option>
        <option value="5 مل">5 مل</option>
        <option value="10 مل">10 مل</option>
        <option value="حقنة">حقنة</option>
        <option value="قطرتان">قطرتان</option>
      </select>
      <select id="medColor">
        <option value="purple">بنفسجي</option>
        <option value="teal">أخضر</option>
        <option value="coral">برتقالي</option>
      </select>
      <button class="add-btn" onclick="addMed()">إضافة</button>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">أدويتي</div>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="clear-btn" id="clearDoneBtn" onclick="clearDone()">حذف المأخوذة</button>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all',this)">الكل</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">متبقي</button>
        <button class="filter-btn" onclick="setFilter('taken',this)">تم</button>
      </div>
    </div>
  </div>

  <div class="med-list" id="list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let meds = [];
try { meds = JSON.parse(localStorage.getItem('meds2') || '[]'); } catch(e){ meds=[]; }
let lastNotif = {};
let currentFilter = 'all';
const icons = ['💊','💉','🩺','🌡️','🧴'];

async function registerSW() {
  if (!('serviceWorker' in navigator)) { setSwStatus('المتصفح لا يدعم الخلفية', false); return; }
  try {
    const reg = await navigator.serviceWorker.register('./sw.js');
    setSwStatus('الخلفية مفعّلة', true);
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data && e.data.type === 'RING') ringCard(e.data.id, e.data.name);
    });
    await navigator.serviceWorker.ready;
    syncToSW();
  } catch { setSwStatus('ابق التاب مفتوحًا للتنبيهات', false); }
}

function setSwStatus(msg, ok) {
  const el = document.getElementById('swStatus');
  el.innerHTML = (ok ? '<span class="dot-live"></span>' : '⚠️') + ' ' + msg;
  if (!ok) el.style.color = 'var(--color-text-danger)';
}

function syncToSW() {
  if (navigator.serviceWorker && navigator.serviceWorker.controller)
    navigator.serviceWorker.controller.postMessage({ type: 'UPDATE_MEDS', meds });
}

registerSW();

function updateNotifBtn() {
  if (!('Notification' in window)) return;
  const p = Notification.permission;
  const btn = document.getElementById('notifBtn');
  const icon = document.getElementById('notifIcon');
  const text = document.getElementById('notifText');
  if (p === 'granted') {
    btn.style.cssText = 'width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;border-radius:var(--border-radius-md);border:0.5px solid #1D9E75;background:var(--color-background-success);color:var(--color-text-success);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:1rem';
    icon.textContent='✅'; text.textContent='الإشعارات مفعّلة';
  } else if (p === 'denied') {
    btn.style.cssText = 'width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;border-radius:var(--border-radius-md);border:0.5px solid #D85A30;background:var(--color-background-danger);color:var(--color-text-danger);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:1rem';
    icon.textContent='❌'; text.textContent='الإشعارات محظورة';
  }
}
updateNotifBtn();

function enableNotif() {
  if (!('Notification' in window)) { showToast('المتصفح لا يدعم الإشعارات'); return; }
  Notification.requestPermission().then(p => { updateNotifBtn(); showToast(p==='granted'?'تم تفعيل الإشعارات ✅':'تم رفض الإشعارات ❌'); });
}

function getStatus(m) {
  if (m.taken) return 'taken';
  const now = new Date();
  const [h,min] = m.time.split(':').map(Number);
  const medDate = new Date(); medDate.setHours(h,min,0,0);
  const diff = medDate - now;
  if (diff < 0) return 'overdue';
  if (diff <= 5*60*1000) return 'soon';
  return 'upcoming';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function addMed() {
  const name = document.getElementById('medName').value.trim();
  const time = document.getElementById('medTime').value;
  const dose = document.getElementById('medDose').value;
  const color = document.getElementById('medColor').value;
  if (!name || !time) { showToast('من فضلك أدخل الاسم والوقت'); return; }
  const icon = icons[Math.floor(Math.random() * icons.length)];
  meds.push({ id: Date.now(), name, time, dose, color, icon, taken: false });
  save(); render();
  document.getElementById('medName').value = '';
  document.getElementById('medTime').value = '';
  showToast('تمت الإضافة ✅');
}

function toggleTaken(id) {
  const m = meds.find(x => x.id === id);
  if (m) { m.taken = !m.taken; save(); render(); }
}

function deleteMed(id) {
  meds = meds.filter(x => x.id !== id); save(); render(); showToast('تم الحذف');
}

function clearDone() {
  const count = meds.filter(m => m.taken).length;
  if (!count) return;
  meds = meds.filter(m => !m.taken); save(); render(); showToast('تم حذف ' + count + ' أدوية مأخوذة');
}

function save() {
  try { localStorage.setItem('meds2', JSON.stringify(meds)); } catch(e){}
  syncToSW(); updateStats();
}

function updateStats() {
  const total = meds.length;
  const taken = meds.filter(m => m.taken).length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-taken').textContent = taken;
  document.getElementById('s-rem').textContent = total - taken;
  const pct = total ? Math.round(taken / total * 100) : 0;
  document.getElementById('prog').style.width = pct + '%';
  const clearBtn = document.getElementById('clearDoneBtn');
  if (clearBtn) clearBtn.style.display = taken > 0 ? 'block' : 'none';
}

function render() {
  updateStats();
  const list = document.getElementById('list');
  let all = [...meds];
  const sortOrder = { overdue: 0, soon: 1, upcoming: 2, taken: 3 };
  all.sort((a, b) => {
    const sa = sortOrder[getStatus(a)];
    const sb = sortOrder[getStatus(b)];
    if (sa !== sb) return sa - sb;
    return a.time.localeCompare(b.time);
  });
  if (currentFilter === 'taken') all = all.filter(m => m.taken);
  if (currentFilter === 'pending') all = all.filter(m => !m.taken);
  if (!all.length) { list.innerHTML = '<div class="empty">لا توجد أدوية في هذا التصنيف</div>'; return; }
  const labelMap = { taken:'تم أخذه', overdue:'فات موعده', upcoming:'قادم', soon:'قريبًا ⚡' };
  list.innerHTML = all.map(m => {
    const status = getStatus(m);
    return `
    <div class="med-card ${m.taken?'taken':status}" id="card-${m.id}">
      <div class="med-dot ${m.taken?'taken-bg':m.color||'purple'}">${m.taken?'✓':m.icon||'💊'}</div>
      <div class="med-info">
        <div class="med-name">${m.name}</div>
        <div class="med-meta">
          ${m.time} · ${m.dose}
          <span class="badge ${status}">${labelMap[status]}</span>
        </div>
      </div>
      <div class="med-actions">
        <button class="take-btn ${m.taken?'undo':''}" onclick="toggleTaken(${m.id})">${m.taken?'تراجع':'أخذته'}</button>
        <button class="del-btn" onclick="deleteMed(${m.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function ringCard(id, name) {
  beep();
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('ring'); setTimeout(() => card.classList.remove('ring'), 2000); }
  showToast('حان وقت ' + name + '!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 1000);

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach(d => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, ctx.currentTime + d);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 0.2);
      o.start(ctx.currentTime + d); o.stop(ctx.currentTime + d + 0.2);
    });
  } catch(e){}
}

setInterval(() => {
  const now = new Date();
  const cur = now.toTimeString().slice(0, 5);
  meds.forEach(m => {
    if (m.time === cur && !m.taken) {
      const key = m.id + '-' + cur;
      if (!lastNotif[key]) {
        lastNotif[key] = true;
        ringCard(m.id, m.name);
        if ('Notification' in window && Notification.permission === 'granted')
          new Notification('تذكير الدواء 💊', { body: 'حان وقت أخذ ' + m.name + ' · ' + m.dose });
      }
    }
    const [h,min] = m.time.split(':').map(Number);
    const medDate = new Date(); medDate.setHours(h,min,0,0);
    const diff = Math.round((medDate - now) / 60000);
    if (diff === 5 && !m.taken) {
      const soonKey = m.id + '-soon-' + cur.slice(0,3);
      if (!lastNotif[soonKey]) {
        lastNotif[soonKey] = true;
        showToast('تنبيه: ' + m.name + ' بعد 5 دقائق');
        if ('Notification' in window && Notification.permission === 'granted')
          new Notification('تذكير مسبق 🔔', { body: m.name + ' بعد 5 دقائق · ' + m.dose });
      }
    }
  });
  render();
}, 10000);

render();
</script>
</body>
</html>
